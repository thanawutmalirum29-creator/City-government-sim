<!DOCTYPE html>
<html>
<head>
  <title>City Government Sim</title>
  <link rel="stylesheet" href="styleเมือง ธีมขาว.css" id="themeStylesheet">
</head>
<body>
  <h1>🏛️ เมืองแห่งความสุข
    <button id="themeToggleBtn" class="theme-toggle" title="สลับธีมสว่าง/มืด">🌙 โหมดมืด</button>
  </h1>

  <div id="info" class="section"></div>
  <div class="section">
    <button onclick="nextMonth()">▶ เดือนถัดไป</button>
    <button id="festivalBtn">🎉 จัดเทศกาล</button>
    <button onclick="buyFood()">🍛ซื้ออาหาร</button>
  <button onclick="openSaveManager()">📂 เซฟเกม</button>

  </div>
<!-- 🔸 หน้าต่างจัดการเซฟ -->
<div id="saveManager" class="modal-overlay" style="display:none;">

  <div class="modal-box">
    <h2>💾 การจัดการเซฟเกม</h2>

    <div class="save-new-row">
      <input id="newSaveName" placeholder="ชื่อเซฟใหม่...">
      <button onclick="createNewSave()">บันทึก</button>
    </div>

    <div id="saveList" class="save-list">
      <!-- รายชื่อเซฟจะแสดงตรงนี้ -->
    </div>

    <br>
    <button onclick="closeSaveManager()">ปิด</button>
  </div>
</div>
  <div class="section">
    <h3>งบประมาณบริการรัฐ</h3>
      <div id="loanPanel">
  <button onclick="requestLoan()">📥 กู้เงิน</button><br>
  <span id="loanStatus">💳 หนี้สิน: 0 บาท</span><br><br>


    <div class="section">
      <button id="fundAllBtn" onclick="fundAll()">💰 จ่ายงบทั้งหมด</button>
    </div>
    <div class="button-grid">
      <button id="btn_park" onclick="fund('park')">🌲🎄กระทรวงสวนสาธารณะ</button>
      <button id="btn_health" onclick="fund('health')">💊 กระทรวงสาธารณสุข</button>
      <button id="btn_police" onclick="fund('police')">👮 สถานีรักษาความปลอดภัย</button>
      <button id="btn_infrastructure" onclick="fund('infrastructure')">🛣️ งบประมาณโครงสร้าง</button>
      <button id="btn_education" onclick="fund('education')">🎓 กระทรวงการศึกษาธิการ</button>
      <button id="btn_military" onclick="fund('military')">🎖️ กระทรวงกลาโหม</button>
      <button id="btn_transport" onclick="fund('transport')">🚌 กระทรวงขนส่ง</button>
      <button id="btn_scholarship" onclick="fund('scholarship')">🎓💵 ทุนการศึกษา</button>
      <button id="btn_environment" onclick="fund('environment')">🌲🏞️กระทรวงสิ่งแวดล้อม</button>
      <button id="btn_disaster" onclick="fund('disaster')">🌊กระทรวงบรรเทาสาธารณะภัย</button>
      <button id="btn_tourism" onclick="fund('tourism')">🛬กระทรวงการท่องเที่ยว</button>
      <button id="btn_technology" onclick="fund('technology')">🛰️วิทยาศาสตร์และเทคโนโลยี</button>
    </div>
  </div>

  <div class="section">
     <button onclick="showCitizensData()">📄 ดูข้อมูลประชาชน</button>
<pre id="citizenDisplay"></pre>
<div class="section">
  <button onclick="showDeadCitizens()">☠️ ดูข้อมูลผู้เสียชีวิต</button>
  <pre id="deadDisplay"></pre>
</div>
    <h3>จ้างข้าราชการ</h3>
        
      <button onclick="openResearchCenter()">🏛️ ศูนย์วิจัย</button>
    <div class="button-grid">
      <button onclick="hireCivilServant('park')">👨‍⚕️ ข้าราชการสวนสาธารณะ</button>
      <button onclick="hireCivilServant('health')">👨‍⚕️ ข้าราชการสาธารณสุข</button>
      <button onclick="hireCivilServant('police')">👮‍♂️ ข้าราชการตำรวจ</button>
      <button onclick="hireCivilServant('infrastructure')">🛣️ ข้าราชการโครงสร้าง</button>
      <button onclick="hireCivilServant('education')">👨‍🏫 ข้าราชการครู</button>
      <button onclick="hireCivilServant('military')">🪖 ข้าราชการทหาร</button>
      <button onclick="hireCivilServant('transport')">🚍 ข้าราชการขนส่ง</button>
      <button onclick="hireCivilServant('scholarship')">👦💵 ข้าราชการทุน</button>
            <button onclick="hireCivilServant('environment')">🚮♻️ ข้าราชด้านสิ่งแวดล้อม</button>
      <button onclick="hireCivilServant('disaster')">🧑‍🚒 ข้าราชบรรเทาสาธารณภัย</button>
      <button onclick="hireCivilServant('tourism')">👨‍✈️ ข้าราชการท่องเที่ยว</button>
            <button onclick="hireCivilServant('technology')">🧑‍🔬 ข้าราชการวิจัย</button>

    </div>
  </div>
